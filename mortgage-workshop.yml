  # ===========================================================================
  # 19. ORACLE SYSMETRIC  → metrics-oracle.sysmetric-mortgage
  #     Integration: oracle (data_stream/sysmetric)
  #     ML techniques: Multi-Metric (with split on service.address) across the
  #                    primary + replica Oracle instances; Regression (DFA)
  #                    predicting response_time_per_txn from hit ratios
  # ===========================================================================
  - indexName: metrics-oracle.sysmetric-mortgage
    dataStream: true
    purgeOnStart: false
    workloadThreads: 1
    workloadSleep: 60000
    elasticsearchBulkQueueDepth: 2   # primary + replica

    fields:
      - name: "@timestamp"
        type: timestamp
        range: "0,0"

      - name: ecs.version
        value: "8.11.0"

      - name: data_stream.type
        value: metrics
      - name: data_stream.dataset
        value: oracle.sysmetric
      - name: data_stream.namespace
        value: mortgage

      - name: event.dataset
        value: oracle.sysmetric
      - name: event.module
        value: sql
      - name: event.duration
        type: long
        range: "50000000,200000000"

      - name: agent.type
        value: metricbeat
      - name: agent.version
        value: "8.13.0"

      - name: host.name
        type: random_string_from_list
        custom_list: "db-primary-01,db-replica-01"
      - name: service.address
        type: random_string_from_list
        custom_list: "oracle-primary:1521,oracle-replica:1521"
      - name: service.type
        value: sql
      - name: metricset.name
        value: query
      - name: metricset.period
        value: 60000

      # Key Oracle sysmetric fields (subset of the ~100 available)
      - name: oracle.sysmetric.active_serial_sessions
        type: int
        range: "1,50"
      - name: oracle.sysmetric.average_active_sessions
        type: float
        range: "0.1,20.0"
      - name: oracle.sysmetric.buffer_cache_hit_ratio
        type: float
        range: "70.0,99.9"
      - name: oracle.sysmetric.cpu_usage_per_sec
        type: float
        range: "1.0,80.0"
      - name: oracle.sysmetric.current_logons_count
        type: int
        range: "5,200"
      - name: oracle.sysmetric.current_open_cursors_count
        type: int
        range: "10,500"
      - name: oracle.sysmetric.database_cpu_time_ratio
        type: float
        range: "5.0,60.0"
      - name: oracle.sysmetric.database_time_per_sec
        type: float
        range: "10.0,500.0"
      - name: oracle.sysmetric.database_wait_time_ratio
        type: float
        range: "40.0,95.0"
      - name: oracle.sysmetric.executions_per_sec
        type: float
        range: "10.0,2000.0"
      - name: oracle.sysmetric.hard_parse_count_per_sec
        type: float
        range: "0.0,200.0"
      - name: oracle.sysmetric.host_cpu_utilization_pct
        type: float
        range: "2.0,95.0"
      - name: oracle.sysmetric.io_megabytes_per_second
        type: float
        range: "0.1,500.0"
      - name: oracle.sysmetric.library_cache_hit_ratio
        type: float
        range: "60.0,99.9"
      - name: oracle.sysmetric.logical_reads_per_sec
        type: float
        range: "100.0,20000.0"
      - name: oracle.sysmetric.physical_reads_per_sec
        type: float
        range: "0.0,1000.0"
      - name: oracle.sysmetric.redo_generated_per_sec
        type: float
        range: "1000.0,500000.0"
      - name: oracle.sysmetric.response_time_per_txn
        type: float
        range: "5.0,500.0"       # regression target
      - name: oracle.sysmetric.session_count
        type: int
        range: "10,300"
      - name: oracle.sysmetric.session_limit_pct
        type: float
        range: "2.0,80.0"
      - name: oracle.sysmetric.shared_pool_free_pct
        type: float
        range: "5.0,40.0"
      - name: oracle.sysmetric.sql_service_response_time
        type: float
        range: "0.001,2.0"
      - name: oracle.sysmetric.user_transaction_per_sec
        type: float
        range: "0.1,50.0"

      - name: tags
        value: oracle-sysmetric


  # ===========================================================================
  # 20. ORACLE TABLESPACE  → metrics-oracle.tablespace-mortgage
  #     Integration: oracle (data_stream/tablespace)
  #     ML techniques: Change Point Detection (free bytes trending down),
  #                    Population analysis (tablespaces as peers within an instance)
  # ===========================================================================
  - indexName: metrics-oracle.tablespace-mortgage
    dataStream: true
    purgeOnStart: false
    workloadThreads: 1
    workloadSleep: 300000    # 5-minute collection interval
    elasticsearchBulkQueueDepth: 8   # one per tablespace

    fields:
      - name: "@timestamp"
        type: timestamp
        range: "0,0"

      - name: ecs.version
        value: "8.11.0"

      - name: data_stream.type
        value: metrics
      - name: data_stream.dataset
        value: oracle.tablespace
      - name: data_stream.namespace
        value: mortgage

      - name: event.dataset
        value: oracle.tablespace
      - name: event.module
        value: sql

      - name: agent.type
        value: metricbeat
      - name: agent.version
        value: "8.13.0"

      - name: host.name
        type: random_string_from_list
        custom_list: "db-primary-01,db-replica-01"
      - name: service.address
        type: random_string_from_list
        custom_list: "oracle-primary:1521/LENDPATHDB,oracle-replica:1521/LENDPATHDB"
      - name: service.type
        value: sql
      - name: metricset.name
        value: query
      - name: metricset.period
        value: 300000

      - name: oracle.tablespace.name
        type: random_string_from_list
        custom_list: >
          LENDPATH_DATA,
          LENDPATH_INDEX,
          LENDPATH_ARCHIVE,
          BORROWER_PII,
          DOCUMENT_STORE,
          AUDIT_DATA,
          TEMP,
          UNDOTBS1

      - name: oracle.tablespace.extended_space.free.bytes
        type: long
        range: "104857600,107374182400"    # 100 MB – 100 GB
      - name: oracle.tablespace.extended_space.total.bytes
        type: long
        range: "107374182400,214748364800"  # 100 GB – 200 GB

      - name: tags
        value: oracle-tablespace


  # ===========================================================================
  # 21. PINGONE AUDIT  → logs-ping_one.audit-mortgage
  #     Integration: ping_one (data_stream/audit)
  #     ML techniques: Rare (unusual IAM actions, MFA bypass attempts, new apps),
  #                    Geo anomaly (lat_long on source.geo.location by user.id);
  #                    COMBINED with oracle.database_audit in a cross-source
  #                    privileged-access rare job
  # ===========================================================================
  - indexName: logs-ping_one.audit-mortgage
    dataStream: true
    purgeOnStart: false
    workloadThreads: 1
    workloadSleep: 350
    elasticsearchBulkQueueDepth: 15

    fields:
      - name: "@timestamp"
        type: timestamp
        range: "0,2"

      - name: ecs.version
        value: "8.11.0"

      - name: data_stream.type
        value: logs
      - name: data_stream.dataset
        value: ping_one.audit
      - name: data_stream.namespace
        value: mortgage

      - name: event.kind
        value: event
      - name: event.category
        type: random_string_from_list
        custom_list: "iam,iam,iam,authentication,configuration"
      - name: event.dataset
        value: ping_one.audit
      - name: event.action
        type: random_string_from_list
        custom_list: >
          USER.ACCESS_ALLOWED,
          USER.ACCESS_ALLOWED,
          USER.ACCESS_ALLOWED,
          USER.ACCESS_DENIED,
          USER.AUTHENTICATION.SUCCESS,
          USER.AUTHENTICATION.SUCCESS,
          USER.AUTHENTICATION.FAILED,
          USER.MFA.SUCCESS,
          USER.MFA.FAILED,
          USER.MFA.BYPASS,
          USER.PASSWORD.RESET,
          USER.ACCOUNT.LOCKED,
          USER.ACCOUNT.UNLOCKED,
          USER.ROLE.GRANTED,
          USER.ROLE.REVOKED,
          APPLICATION.ACCESS.GRANTED,
          APPLICATION.ACCESS.REVOKED,
          FLOW.EXECUTION.SUCCESS,
          ADMIN.USER.CREATED,
          ADMIN.USER.DELETED,
          ADMIN.APPLICATION.CREATED,
          ADMIN.POLICY.UPDATED,
          ADMIN.SAML.ASSERTION.CREATED
      - name: event.outcome
        type: random_string_from_list
        custom_list: "success,success,success,failure"
      - name: event.type
        type: random_string_from_list
        custom_list: "user,info,access"

      - name: input.type
        value: http_endpoint

      - name: user.id
        type: random_string_from_list
        custom_list: >
          lo-001-uuid,lo-002-uuid,lo-003-uuid,lo-004-uuid,lo-005-uuid,
          lo-006-uuid,lo-007-uuid,lo-008-uuid,lo-009-uuid,lo-010-uuid,
          proc-01-uuid,proc-02-uuid,
          uw-01-uuid,uw-02-uuid,uw-03-uuid,
          admin-01-uuid,sysadmin-uuid
      - name: user.email
        type: email
      - name: user.name
        type: full_name

      - name: client.user.id
        type: uuid
      - name: client.user.name
        type: random_string_from_list
        custom_list: >
          LendPath Portal,
          LendPath Mobile,
          LendPath Admin Console,
          LendPath API,
          LendPath LOS Integration,
          ServiceNow Integration,
          Salesforce Integration

      # Source geo — critical for PingOne geo anomaly job
      - name: source.ip
        type: ipv4
      - name: source.geo.location
        type: geo_point
      - name: source.geo.country_iso_code
        type: random_string_from_list
        custom_list: "US,US,US,US,US,US,US,US,US,US,US,US,CA,MX,CN,RU,NG"
      - name: source.geo.city_name
        type: city
      - name: source.geo.region_name
        type: state

      - name: ping_one.audit.action.type
        type: random_string_from_list
        custom_list: >
          USER.ACCESS_ALLOWED,
          USER.AUTHENTICATION.SUCCESS,
          USER.AUTHENTICATION.FAILED,
          USER.MFA.BYPASS,
          USER.ROLE.GRANTED,
          ADMIN.USER.CREATED,
          ADMIN.POLICY.UPDATED,
          ADMIN.SAML.ASSERTION.CREATED

      - name: ping_one.audit.actors.client.type
        value: CLIENT
      - name: ping_one.audit.actors.user.type
        value: USER

      - name: ping_one.audit.result.status
        type: random_string_from_list
        custom_list: "SUCCESS,SUCCESS,SUCCESS,FAILED,FAILED"
      - name: ping_one.audit.result.description
        type: random_string_from_list
        custom_list: >
          Passed role access control,
          Authentication successful,
          MFA verified,
          Invalid credentials,
          Account locked,
          MFA bypass code used,
          Policy evaluation passed,
          SAML assertion issued for LendPath Portal

      # Risk signals for classification
      - name: ping_one.audit.risk.score
        type: float
        range: "0,100"
      - name: ping_one.audit.risk.level
        type: random_string_from_list
        custom_list: "LOW,LOW,LOW,LOW,MEDIUM,MEDIUM,HIGH"

      - name: tags
        value: ping_one-audit